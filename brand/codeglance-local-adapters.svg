        </g>
        <text x="52" y="31">Codex</text>
        <text x="16" y="58" fill="#86ECE7" font-size="11">AGENTS.md</text>
      </g>
      <g transform="translate(188 122)">
        <rect width="126" height="74" rx="14" fill="#0D1A24" stroke="#254757"/>
        <g transform="translate(16 10) scale(.95)" fill="#E6F6FB">
          <path d="M17.3041 3.541h-3.6718l6.696 16.918H24Zm-10.6082 0L0 20.459h3.7442l1.3693-3.5527h7.0052l1.3693 3.5528h3.7442L10.5363 3.5409Zm-.3712 10.2232 2.2914-5.9456 2.2914 5.9456Z"/>
        </g>
        <text x="52" y="31">Claude</text>
        <text x="16" y="58" fill="#86ECE7" font-size="11">.claude/</text>
      </g>
      <g transform="translate(36 214)">
        <rect width="126" height="74" rx="14" fill="#0D1A24" stroke="#254757"/>
        <g transform="translate(16 10) scale(.95)" fill="#E6F6FB">
          <path d="M11.503.131 1.891 5.678a.84.84 0 0 0-.42.726v11.188c0 .3.162.575.42.724l9.609 5.55a1 1 0 0 0 .998 0l9.61-5.55a.84.84 0 0 0 .42-.724V6.404a.84.84 0 0 0-.42-.726L12.497.131a1.01 1.01 0 0 0-.996 0M2.657 6.338h18.55c.263 0 .43.287.297.515L12.23 22.918c-.062.107-.229.064-.229-.06V12.335a.59.59 0 0 0-.295-.51l-9.11-5.257c-.109-.063-.064-.23.061-.23"/>
        </g>
        <text x="52" y="31">Cursor</text>
        <text x="16" y="58" fill="#86ECE7" font-size="11">rules</text>
      </g>
      <g transform="translate(188 214)">
        <rect width="126" height="74" rx="14" fill="#0D1A24" stroke="#254757"/>
        <g transform="translate(16 10) scale(.95)" fill="#E6F6FB">
          <path d="M23.15 2.587L18.21.21a1.494 1.494 0 0 0-1.705.29l-9.46 8.63-4.12-3.128a.999.999 0 0 0-1.276.057L.327 7.261A1 1 0 0 0 .326 8.74L3.899 12 .326 15.26a1 1 0 0 0 .001 1.479L1.65 17.94a.999.999 0 0 0 1.276.057l4.12-3.128 9.46 8.63a1.492 1.492 0 0 0 1.704.29l4.942-2.377A1.5 1.5 0 0 0 24 20.06V3.939a1.5 1.5 0 0 0-.85-1.352zm-5.146 14.861L10.826 12l7.178-5.448v10.896z"/>
        </g>
        <text x="52" y="31">VS Code</text>
        <text x="16" y="58" fill="#86ECE7" font-size="11">open links</text>
      </g>
      <g transform="translate(36 306)">
        <rect width="126" height="74" rx="14" fill="#0D1A24" stroke="#254757"/>
        <text x="18" y="30" font-size="19" fill="#E6F6FB">+</text>
        <text x="44" y="30">More</text>
        <text x="16" y="58" fill="#86ECE7" font-size="11">Copilot, Gemini...</text>
      </g>
      <g transform="translate(188 306)">
        <rect width="126" height="74" rx="14" fill="#0D1A24" stroke="#254757"/>
        <text x="18" y="30" font-size="19" fill="#E6F6FB">✓</text>
        <text x="44" y="30">Validate</text>
        <text x="16" y="58" fill="#86ECE7" font-size="11">dry-run first</text>
      </g>
    </g>
    <text x="175" y="414" text-anchor="middle" font-size="11" fill="#668492">No affiliation implied; adapters write local guidance.</text>
  </g>
  <text x="700" y="578" text-anchor="middle" font-family="Bahnschrift,'Segoe UI',Arial,sans-serif" font-size="30" fill="#99B4C0">scan once, then give every tool the same evidence map</text>
</svg>
