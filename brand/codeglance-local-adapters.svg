    <text x="175" y="58" text-anchor="middle" font-size="29" font-weight="700" fill="#F3FBFF">Local adapters</text>
    <text x="175" y="88" text-anchor="middle" font-size="16" fill="#99B4C0">repo files, not hosted plugins</text>
