    <circle cx="250" cy="262" r="60" fill="#0D1A24" stroke="url(#cyan)" stroke-width="7" filter="url(#glow)"/>
    <text x="250" y="254" text-anchor="middle" font-family="Bahnschrift,'Segoe UI',Arial,sans-serif" font-size="25" font-weight="700" fill="#F3FBFF">evidence</text>
    <text x="250" y="282" text-anchor="middle" font-family="'JetBrains Mono',Consolas,monospace" font-size="13" fill="#86ECE7">locked context</text>
    <g fill="#0D1A24" stroke="#38BDF8" stroke-width="2.5">
      <rect x="86" y="154" width="112" height="46" rx="10"/>
      <rect x="310" y="152" width="112" height="46" rx="10"/>
      <rect x="78" y="326" width="132" height="46" rx="10"/>
      <rect x="300" y="330" width="142" height="46" rx="10"/>
    </g>
    <g font-family="'JetBrains Mono',Consolas,monospace" font-size="15" fill="#D7E8EF">
      <text x="116" y="183">files</text>
      <text x="340" y="181">calls</text>
      <text x="110" y="355">flows</text>
      <text x="332" y="359">impact</text>
    </g>
    <g fill="#22D3EE" opacity=".86">
      <circle cx="52" cy="112" r="4"/>
      <circle cx="462" cy="210" r="3.5"/>
      <circle cx="416" cy="438" r="3.5"/>
      <circle cx="126" cy="462" r="3"/>
      <circle cx="474" cy="82" r="3"/>
    </g>
  </g>

