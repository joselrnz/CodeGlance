<svg viewBox="0 0 1400 620" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Codeglance scans once, builds an evidence map, and writes local adapter files for AI coding tools">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#071017"/>
      <stop offset="56%" stop-color="#09141C"/>
      <stop offset="100%" stop-color="#0E1B24"/>
    </linearGradient>
    <linearGradient id="scan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0"/>
      <stop offset="45%" stop-color="#22D3EE" stop-opacity=".34"/>
      <stop offset="100%" stop-color="#2DD4BF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8CF4FF"/>
      <stop offset="52%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#14B8A6"/>
    </linearGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity=".28"/>
      <stop offset="55%" stop-color="#22D3EE" stop-opacity=".08"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1400" height="620" rx="34" fill="url(#bg)"/>
  <rect x="2" y="2" width="1396" height="616" rx="32" fill="none" stroke="#173242" stroke-width="2"/>
  <path d="M124 306 L1268 94 L1268 522 Z" fill="url(#scan)"/>
  <path d="M90 506 C232 438 394 508 560 448 S940 394 1282 478" fill="none" stroke="#123040" stroke-width="2" opacity=".58"/>
  <path d="M150 104 C360 40 544 86 710 116 S1040 136 1260 66" fill="none" stroke="#123040" stroke-width="2" opacity=".46"/>
  <g opacity=".18" stroke="#1B3544" stroke-width="1">
    <path d="M160 156 H1250 M160 226 H1250 M160 296 H1250 M160 366 H1250 M160 436 H1250"/>
    <path d="M230 112 V508 M370 112 V508 M510 112 V508 M650 112 V508 M790 112 V508 M930 112 V508 M1070 112 V508 M1210 112 V508"/>
  </g>

  <g transform="translate(106 82)">
    <rect width="382" height="458" rx="28" fill="#0B1720" stroke="#244657" stroke-width="2"/>
    <rect x="22" y="22" width="338" height="48" rx="13" fill="#122635"/>
    <circle cx="50" cy="46" r="6" fill="#38BDF8"/>
    <circle cx="76" cy="46" r="6" fill="#22D3EE"/>
    <circle cx="102" cy="46" r="6" fill="#2DD4BF"/>
    <text x="32" y="120" font-family="Bahnschrift,'Segoe UI',Arial,sans-serif" font-size="24" font-weight="700" fill="#F3FBFF">One local scan</text>
    <g font-family="'JetBrains Mono',Consolas,monospace" font-size="16">
      <text x="32" y="172" fill="#7EA1B1">class PaymentFlow</text>
      <text x="32" y="222" fill="#7EA1B1">def authorize()</text>
      <text x="32" y="272" fill="#7EA1B1">def capture()</text>
      <text x="32" y="322" fill="#7EA1B1">emit Receipt</text>
      <text x="32" y="372" fill="#7EA1B1">notify User</text>
      <rect x="28" y="396" width="286" height="44" rx="10" fill="#0D1A24" stroke="#254757"/>
      <text x="48" y="425" fill="#D7E8EF"><tspan fill="#2DD4BF">$</tspan> codeglance generate</text>
    </g>
  </g>

  <g transform="translate(514 54)">
    <circle cx="250" cy="262" r="230" fill="url(#core)"/>
    <circle cx="250" cy="262" r="222" fill="#07131B" stroke="#143040" stroke-width="2"/>
    <circle cx="250" cy="262" r="168" fill="none" stroke="#1E4A58" stroke-width="2"/>
