<svg viewBox="0 0 1400 520" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Codeglance workflow from repository scan to graph, human outputs, agent context, and local adapters">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#071017"/>
      <stop offset="56%" stop-color="#09141C"/>
      <stop offset="100%" stop-color="#0E1B24"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8CF4FF"/>
      <stop offset="50%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#14B8A6"/>
    </linearGradient>
    <radialGradient id="lensGlass" cx="36%" cy="28%" r="76%">
      <stop offset="0%" stop-color="#E6F6FB" stop-opacity=".20"/>
      <stop offset="42%" stop-color="#38BDF8" stop-opacity=".055"/>
      <stop offset="100%" stop-color="#061018" stop-opacity=".05"/>
    </radialGradient>
    <linearGradient id="rimEdge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8CF4FF"/>
      <stop offset="43%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
    <linearGradient id="handleEdge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6EE7F9"/>
      <stop offset="52%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#14B8A6"/>
    </linearGradient>
    <linearGradient id="beam" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0"/>
      <stop offset="50%" stop-color="#22D3EE" stop-opacity=".22"/>
      <stop offset="100%" stop-color="#2DD4BF" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="170%">
      <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#02070A" flood-opacity=".42"/>
    </filter>
    <filter id="rimGlow" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="workflowWindowClip">
      <rect x="118" y="72" width="468" height="278" rx="26"/>
    </clipPath>
    <clipPath id="workflowLensClip">
      <circle cx="400" cy="220" r="114"/>
    </clipPath>
  </defs>
  <rect width="1400" height="520" rx="34" fill="url(#bg)"/>
  <rect x="2" y="2" width="1396" height="516" rx="32" fill="none" stroke="#173242" stroke-width="2"/>
  <path d="M120 250 L1280 114 L1280 406 Z" fill="url(#beam)"/>
  <path d="M126 420 C270 356 430 428 604 374 S982 320 1272 384" fill="none" stroke="#123040" stroke-width="2" opacity=".55"/>
  <g opacity=".18" stroke="#1B3544" stroke-width="1">
    <path d="M100 140 H1300 M100 220 H1300 M100 300 H1300 M100 380 H1300"/>
    <path d="M220 90 V430 M380 90 V430 M540 90 V430 M700 90 V430 M860 90 V430 M1020 90 V430 M1180 90 V430"/>
  </g>

  <g font-family="Bahnschrift,'Segoe UI',Arial,sans-serif">
    <g transform="translate(76 148)">
      <rect width="230" height="188" rx="22" fill="#0B1720" stroke="#244657" stroke-width="2"/>
      <rect x="20" y="20" width="190" height="36" rx="10" fill="#122635"/>
      <circle cx="42" cy="38" r="5" fill="#38BDF8"/>
      <circle cx="64" cy="38" r="5" fill="#22D3EE"/>
      <circle cx="86" cy="38" r="5" fill="#2DD4BF"/>
      <text x="115" y="96" text-anchor="middle" font-size="28" font-weight="700" fill="#F3FBFF">Repo</text>
      <text x="115" y="126" text-anchor="middle" font-size="16" fill="#99B4C0">source, docs, config</text>
      <text x="115" y="158" text-anchor="middle" font-family="'JetBrains Mono',Consolas,monospace" font-size="14" fill="#86ECE7">local only</text>
    </g>

    <path d="M326 242 H436" stroke="#22D3EE" stroke-width="4" stroke-linecap="round"/>
    <path d="M424 231 L438 242 L424 253" fill="none" stroke="#22D3EE" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

    <g transform="translate(456 128)">
      <rect width="250" height="228" rx="24" fill="#0B1720" stroke="#244657" stroke-width="2"/>
      <g transform="translate(5 1) scale(.32)">
        <rect x="108" y="62" width="488" height="298" rx="30" fill="#0D1720" stroke="#234456" stroke-width="2.5"/>
        <g clip-path="url(#workflowWindowClip)">
          <rect x="118" y="72" width="468" height="278" fill="#0B1720"/>
          <rect x="118" y="72" width="468" height="48" fill="#122635"/>
          <circle cx="150" cy="96" r="7.5" fill="#38BDF8"/>
          <circle cx="181" cy="96" r="7.5" fill="#22D3EE"/>
          <circle cx="212" cy="96" r="7.5" fill="#2DD4BF"/>
          <g clip-path="url(#workflowLensClip)">
            <rect x="266" y="86" width="304" height="290" fill="#0A151D"/>
            <g opacity=".33" stroke="#1F3D4A" stroke-width="1">
              <path d="M266 130 H570 M266 172 H570 M266 214 H570 M266 256 H570 M266 298 H570"/>
              <path d="M298 86 V376 M340 86 V376 M382 86 V376 M424 86 V376 M466 86 V376 M508 86 V376"/>
            </g>
            <path d="M308 173 H382 V142 H466 V184 H516" fill="none" stroke="#244758" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M383 178 V250 H470 V304 H528" fill="none" stroke="#2DD4BF" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M328 300 H384 V252" fill="none" stroke="#38BDF8" stroke-width="7" stroke-linecap="round"/>
            <rect x="324" y="150" width="78" height="44" rx="9" fill="#38BDF8"/>
            <rect x="448" y="164" width="78" height="46" rx="9" fill="#162B38" stroke="#4B7180" stroke-width="2.5"/>
            <rect x="336" y="278" width="74" height="44" rx="9" fill="#155E75"/>
            <rect x="470" y="288" width="78" height="44" rx="9" fill="#0F2A35" stroke="#2DD4BF" stroke-width="2.5"/>
            <circle cx="351" cy="166" r="6" fill="#E6F6FB"/>
          </g>
        </g>
        <path d="M488 308 L584 404" stroke="#02080C" stroke-width="42" stroke-linecap="round" opacity=".52" filter="url(#softShadow)"/>
        <path d="M496 316 L584 404" stroke="url(#handleEdge)" stroke-width="28" stroke-linecap="round"/>
        <path d="M510 330 L570 390" stroke="#B6FAFF" stroke-width="5" stroke-linecap="round" opacity=".30"/>
        <circle cx="400" cy="220" r="121" fill="none" stroke="#02080C" stroke-width="20" opacity=".62" filter="url(#softShadow)"/>
        <circle cx="400" cy="220" r="114" fill="url(#lensGlass)" stroke="#0C2A35" stroke-width="23"/>
        <circle cx="400" cy="220" r="114" fill="none" stroke="url(#rimEdge)" stroke-width="15" filter="url(#rimGlow)"/>
        <circle cx="400" cy="220" r="100" fill="none" stroke="#B9F7FF" stroke-width="1.5" opacity=".20"/>
        <path d="M330 150 A99 99 0 0 1 386 124" fill="none" stroke="#E6F6FB" stroke-width="7" stroke-linecap="round" opacity=".44"/>
        <path d="M348 135 A106 106 0 0 1 438 122" fill="none" stroke="#B8F7FF" stroke-width="3" stroke-linecap="round" opacity=".22"/>
      </g>
      <text x="125" y="176" text-anchor="middle" font-size="27" font-weight="700" fill="#F3FBFF">Scan</text>
      <text x="125" y="205" text-anchor="middle" font-size="16" fill="#99B4C0">symbols + edges</text>
    </g>

    <path d="M730 242 H840" stroke="#22D3EE" stroke-width="4" stroke-linecap="round"/>
    <path d="M828 231 L842 242 L828 253" fill="none" stroke="#22D3EE" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

    <g transform="translate(862 76)">
      <rect width="462" height="336" rx="28" fill="#0B1720" stroke="#244657" stroke-width="2"/>
      <text x="231" y="58" text-anchor="middle" font-size="30" font-weight="700" fill="#F3FBFF">Evidence map</text>
      <text x="231" y="86" text-anchor="middle" font-size="16" fill="#99B4C0">one graph, multiple surfaces</text>
      <g transform="translate(78 108)">
        <circle cx="154" cy="78" r="70" fill="#07131B" stroke="#143040" stroke-width="2"/>
        <circle cx="154" cy="78" r="48" fill="none" stroke="#1E4A58" stroke-width="2"/>
        <g stroke="#2DD4BF" stroke-width="3" stroke-linecap="round">
          <path d="M154 78 L154 26"/>
          <path d="M154 78 L76 78"/>
          <path d="M154 78 L232 78"/>
        </g>
        <circle cx="154" cy="78" r="36" fill="#0D1A24" stroke="url(#cyan)" stroke-width="6" filter="url(#glow)"/>
        <g fill="#0D1A24" stroke="#38BDF8" stroke-width="2.5">
          <rect x="119" y="8" width="70" height="34" rx="9"/>
          <rect x="28" y="61" width="78" height="34" rx="9"/>
          <rect x="202" y="61" width="78" height="34" rx="9"/>
        </g>
        <g fill="#2DD4BF" opacity=".8">
          <circle cx="111" cy="119" r="5"/>
          <circle cx="154" cy="128" r="5"/>
          <circle cx="197" cy="119" r="5"/>
        </g>
        <text x="154" y="74" text-anchor="middle" font-size="18" font-weight="700" fill="#F3FBFF">evidence</text>
        <text x="154" y="95" text-anchor="middle" font-family="'JetBrains Mono',Consolas,monospace" font-size="11" fill="#86ECE7">map</text>
        <g font-family="'JetBrains Mono',Consolas,monospace" font-size="12" fill="#D7E8EF">
          <text x="154" y="30" text-anchor="middle">files</text>
          <text x="67" y="83" text-anchor="middle">calls</text>
          <text x="241" y="83" text-anchor="middle">flows</text>
        </g>
      </g>
      <g font-size="16" font-weight="700">
        <rect x="38" y="270" width="118" height="44" rx="12" fill="#0D1A24" stroke="#254757"/>
        <text x="97" y="298" text-anchor="middle" fill="#D7E8EF">humans</text>
        <rect x="172" y="270" width="118" height="44" rx="12" fill="#0D1A24" stroke="#254757"/>
        <text x="231" y="298" text-anchor="middle" fill="#D7E8EF">agents</text>
        <rect x="306" y="270" width="118" height="44" rx="12" fill="#0D1A24" stroke="#254757"/>
        <text x="365" y="298" text-anchor="middle" fill="#D7E8EF">review</text>
      </g>
    </g>
  </g>

  <text x="700" y="472" text-anchor="middle" font-family="Bahnschrift,'Segoe UI',Arial,sans-serif" font-size="28" fill="#99B4C0">scan once, then read, ask, review, and hand off with the same evidence</text>
</svg>
