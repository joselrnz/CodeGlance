        <path d="M308 173 H382 V142 H466 V184 H516" fill="none" stroke="#244758" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M383 178 V250 H470 V304 H528" fill="none" stroke="#2DD4BF" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M328 300 H384 V252" fill="none" stroke="#38BDF8" stroke-width="7" stroke-linecap="round"/>
        <rect x="324" y="150" width="78" height="44" rx="9" fill="#38BDF8"/>
        <rect x="448" y="164" width="78" height="46" rx="9" fill="#162B38" stroke="#4B7180" stroke-width="2.5"/>
        <rect x="336" y="278" width="74" height="44" rx="9" fill="#155E75"/>
        <rect x="470" y="288" width="78" height="44" rx="9" fill="#0F2A35" stroke="#2DD4BF" stroke-width="2.5"/>
        <circle cx="351" cy="166" r="6" fill="#E6F6FB"/>
      </g>
