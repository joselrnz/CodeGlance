  <path d="M642 330 C812 270 976 316 1136 286 S1392 278 1510 328" fill="none" stroke="#123040" stroke-width="2" opacity=".44"/>
  <path d="M640 122 L1496 78 L1496 344 L640 286 Z" fill="#22D3EE" opacity=".035"/>

