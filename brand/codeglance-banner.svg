          <path d="M266 130 H570 M266 172 H570 M266 214 H570 M266 256 H570 M266 298 H570"/>
          <path d="M298 86 V376 M340 86 V376 M382 86 V376 M424 86 V376 M466 86 V376 M508 86 V376"/>
