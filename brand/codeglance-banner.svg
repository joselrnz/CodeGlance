    <path d="M790 218 H1386" stroke="#22D3EE" stroke-width="1.5" opacity=".20"/>
    <path d="M784 102 H1040" stroke="#22D3EE" stroke-width="2.5" stroke-linecap="round" opacity=".45"/>
    <path d="M1130 214 H1390" stroke="#2DD4BF" stroke-width="2.5" stroke-linecap="round" opacity=".38"/>
    <text x="1088" y="184" text-anchor="middle" font-family="Bahnschrift, 'Aptos Display', 'Segoe UI', Arial, sans-serif" font-size="112" font-weight="700" font-stretch="semi-condensed" letter-spacing="1.25" fill="url(#word)">
      <tspan fill="#F3FBFF">code</tspan><tspan fill="#86ECE7">glance</tspan>
    </text>
    <text x="1088" y="272" text-anchor="middle" font-family="Bahnschrift, 'Aptos Display', 'Segoe UI', Arial, sans-serif" font-size="31" font-weight="400" letter-spacing=".35" fill="#99B4C0">turn a repo into a readable map</text>
    <g transform="translate(883,318)" font-family="'JetBrains Mono','Cascadia Code',Consolas,monospace" font-size="23">
      <rect width="410" height="50" rx="12" fill="#0D1A24" stroke="#254757" stroke-width="1.5"/>
      <text x="25" y="33"><tspan fill="#2DD4BF">$</tspan><tspan fill="#D7E8EF" dx="13">pip install codeglance</tspan></text>
    </g>
