    <path d="M488 308 L584 404" stroke="#02080C" stroke-width="42" stroke-linecap="round" opacity=".52" filter="url(#softShadow)"/>
    <path d="M496 316 L584 404" stroke="url(#handleEdge)" stroke-width="28" stroke-linecap="round"/>
    <path d="M510 330 L570 390" stroke="#B6FAFF" stroke-width="5" stroke-linecap="round" opacity=".30"/>
    <circle cx="400" cy="220" r="121" fill="none" stroke="#02080C" stroke-width="20" opacity=".62" filter="url(#softShadow)"/>
    <circle cx="400" cy="220" r="114" fill="url(#lensGlass)" stroke="#0C2A35" stroke-width="23"/>
    <circle cx="400" cy="220" r="114" fill="none" stroke="url(#rimEdge)" stroke-width="15" filter="url(#rimGlow)"/>
    <circle cx="400" cy="220" r="100" fill="none" stroke="#B9F7FF" stroke-width="1.5" opacity=".20"/>
    <path d="M330 150 A99 99 0 0 1 386 124" fill="none" stroke="#E6F6FB" stroke-width="7" stroke-linecap="round" opacity=".44"/>
    <path d="M348 135 A106 106 0 0 1 438 122" fill="none" stroke="#B8F7FF" stroke-width="3" stroke-linecap="round" opacity=".22"/>
  </g>

