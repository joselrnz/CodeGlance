<svg viewBox="0 0 1600 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="codeglance wide banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#071017"/>
      <stop offset="56%" stop-color="#09141C"/>
      <stop offset="100%" stop-color="#0E1B24"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D1720"/>
      <stop offset="100%" stop-color="#111F2A"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="48%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#2DD4BF"/>
    </linearGradient>
    <linearGradient id="word" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F3FBFF"/>
      <stop offset="52%" stop-color="#DDF7FC"/>
      <stop offset="100%" stop-color="#8DEBE4"/>
    </linearGradient>
    <radialGradient id="lensGlass" cx="36%" cy="28%" r="76%">
      <stop offset="0%" stop-color="#E6F6FB" stop-opacity=".20"/>
      <stop offset="42%" stop-color="#38BDF8" stop-opacity=".055"/>
      <stop offset="100%" stop-color="#061018" stop-opacity=".05"/>
    </radialGradient>
    <linearGradient id="rimEdge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8CF4FF"/>
      <stop offset="43%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
    <linearGradient id="handleEdge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6EE7F9"/>
      <stop offset="52%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#14B8A6"/>
    </linearGradient>
    <linearGradient id="namePlate" x1="0" y1="0" x2="1" y2="0">
